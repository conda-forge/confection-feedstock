{% set version = "1.3.3" %}

package:
  name: confection
  version: {{ version }}

source:
  url: https://github.com/explosion/confection/archive/refs/tags/release-v{{ version }}.tar.gz
  sha256: c977841f277255b0b59acb5b4e8a2d7d266ee4369278308fc2b820ec314fc5d7
  patches:
    - patches/0001-make-tests-importable-out-of-tree.patch

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - confection
  requires:
    - python {{ python_min }}
    - pytest
    - hypothesis
    - numpy
    - pip
    - catalogue >=2.0.3,<2.1.0
    - pydantic >=1.7.4,<3.0.0
    - pathy >=0.3.5
  source_files:
    - tests/
  commands:
    - pytest --tb=native -v tests/
    - pip check


about:
  home: https://github.com/explosion/confection
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: The sweetest config system for Python
  description: |
    A lightweight library that offers a configuration system letting you
    conveniently describe arbitrary trees of objects.
  doc_url: https://github.com/explosion/confection
  dev_url: https://github.com/explosion/confection

extra:
  recipe-maintainers:
    - conda-forge/spacy
    - rxm7706
