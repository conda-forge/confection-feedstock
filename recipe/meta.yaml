{% set version = "1.3.2" %}

package:
  name: confection
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/confection/confection-{{ version }}.tar.gz
  sha256: 6590efa4e6ee5465ead06f563ae147a6c8059f42852427aa436744951caf8839

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - confection
  requires:
    - python {{ python_min }}
    - pytest
    - hypothesis
    - numpy
    - pip
    - catalogue >=2.0.3,<2.1.0
    - pydantic >=1.7.4,<3.0.0
    - pathy >=0.3.5
  commands:
    - python -m pytest --tb=native --pyargs confection
    - pip check


about:
  home: https://github.com/explosion/confection
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: The sweetest config system for Python
  description: |
    A lightweight library that offers a configuration system letting you
    conveniently describe arbitrary trees of objects.
  doc_url: https://github.com/explosion/confection
  dev_url: https://github.com/explosion/confection

extra:
  recipe-maintainers:
    - conda-forge/spacy
    - rxm7706
